<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verb Forge — Master Irregular Verbs</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #16161d;
    --card: #1e1e28;
    --border: #2e2e3e;
    --accent: #f0c14b;
    --accent2: #e05c5c;
    --accent3: #5ce07a;
    --text: #f0f0f5;
    --muted: #7a7a99;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    overflow-x: hidden;
  }

  /* Animated noise grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Header */
  header {
    text-align: center;
    padding-top: 12px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--accent) 30%, #f07b4b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 6px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }

  /* Score row */
  .score-row {
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
  }
  .score-chips {
    display: flex;
    gap: 8px;
  }
  .chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 6px 14px;
    font-size: 0.82rem;
    font-family: 'DM Mono', monospace;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .chip .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .chip.correct .dot { background: var(--accent3); }
  .chip.wrong .dot { background: var(--accent2); }
  .chip.best { color: var(--accent); border-color: #3a3010; background: #1a1500; }

  /* Timer */
  .timer-section {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .timer-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 50px;
    padding: 5px 12px;
    font-size: 0.78rem;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: all 0.2s;
  }
  .timer-toggle:hover, .timer-toggle.active {
    border-color: var(--accent);
    color: var(--accent);
  }
  .timer-bar-wrap {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    display: none;
  }
  .timer-bar-wrap.visible { display: block; }
  .timer-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    width: 100%;
    transition: width 0.1s linear, background 0.5s;
  }
  .timer-bar.warning { background: var(--accent2); }

  /* Main card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 28px;
    position: relative;
    overflow: hidden;
    transition: box-shadow 0.3s;
  }
  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }
  .card.shake {
    animation: shake 0.4s ease;
  }
  .card.correct-flash {
    box-shadow: 0 0 0 2px var(--accent3), 0 0 40px rgba(92,224,122,0.15);
  }
  .card.wrong-flash {
    box-shadow: 0 0 0 2px var(--accent2), 0 0 40px rgba(224,92,92,0.15);
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .verb-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .verb-display {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 9vw, 4.2rem);
    font-weight: 700;
    line-height: 1;
    margin-bottom: 28px;
    color: var(--text);
    position: relative;
    display: inline-block;
  }
  .verb-display .verb-anim {
    display: inline-block;
    animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn {
    from { opacity: 0; transform: translateY(12px) scale(0.92); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  input[type="text"] {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1.05rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(240,193,75,0.12);
  }
  input[type="text"].correct-input { border-color: var(--accent3); }
  input[type="text"].wrong-input   { border-color: var(--accent2); }

  .btn-check {
    background: var(--accent);
    color: #1a1200;
    border: none;
    border-radius: 10px;
    padding: 14px 20px;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: transform 0.15s, background 0.15s, box-shadow 0.15s;
    white-space: nowrap;
  }
  .btn-check:hover {
    background: #f5ce6a;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(240,193,75,0.3);
  }
  .btn-check:active { transform: translateY(0); }

  /* Feedback */
  .feedback {
    margin-top: 18px;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 0.92rem;
    display: none;
    animation: fadeUp 0.25s ease;
    align-items: center;
    gap: 10px;
  }
  .feedback.visible { display: flex; }
  .feedback.correct-fb {
    background: rgba(92,224,122,0.08);
    border: 1px solid rgba(92,224,122,0.25);
    color: var(--accent3);
  }
  .feedback.wrong-fb {
    background: rgba(224,92,92,0.08);
    border: 1px solid rgba(224,92,92,0.25);
    color: var(--accent2);
  }
  .feedback .fb-icon { font-size: 1.3rem; flex-shrink: 0; }
  .feedback .fb-text strong { font-family: 'DM Mono', monospace; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn {
    flex: 1;
    min-width: 120px;
    padding: 13px 16px;
    border-radius: 10px;
    font-size: 0.9rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--text);
  }
  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-1px);
  }
  .btn.primary {
    background: var(--accent);
    color: #1a1200;
    border-color: var(--accent);
  }
  .btn.primary:hover {
    background: #f5ce6a;
    color: #1a1200;
  }

  /* Progress bar */
  .progress-section {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #f07b4b);
    border-radius: 6px;
    transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    white-space: nowrap;
  }

  /* Streak badge */
  .streak {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, #3a2200, #2a1800);
    border: 1px solid #5a3800;
    border-radius: 50px;
    padding: 5px 12px;
    font-size: 0.82rem;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    transition: all 0.3s;
  }
  .streak.hot {
    animation: pulse 1s infinite;
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(240,193,75,0.3);
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 12px rgba(240,193,75,0.3); }
    50% { box-shadow: 0 0 24px rgba(240,193,75,0.5); }
  }

  /* Hint */
  .hint-row {
    margin-top: 12px;
    font-size: 0.8rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    min-height: 1.2em;
    transition: all 0.3s;
  }
  .hint-row span { color: var(--accent); letter-spacing: 0.1em; }

  /* Responsive */
  @media (max-width: 420px) {
    .card { padding: 24px 18px; }
    .btn { min-width: 100px; font-size: 0.84rem; }
    .score-row { gap: 6px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Verb Forge</h1>
    <p>// irregular verb trainer — past participle mode</p>
  </header>

  <div class="score-row">
    <div class="score-chips">
      <div class="chip correct"><div class="dot"></div><span id="scoreCorrect">0</span> correct</div>
      <div class="chip wrong"><div class="dot"></div><span id="scoreWrong">0</span> wrong</div>
    </div>
    <div class="streak" id="streakBadge">🔥 <span id="streakCount">0</span> streak</div>
    <div class="chip best">⭐ Best: <span id="bestScore">0</span></div>
  </div>

  <div class="timer-section">
    <button class="timer-toggle" id="timerToggle" onclick="toggleTimer()">⏱ Timer</button>
    <div class="timer-bar-wrap" id="timerBarWrap">
      <div class="timer-bar" id="timerBar"></div>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressLabel">0 / 148</div>
  </div>

  <div class="card" id="mainCard">
    <div class="verb-label">Infinitive (1st form)</div>
    <div class="verb-display"><span class="verb-anim" id="verbDisplay">—</span></div>

    <div class="input-row">
      <input type="text" id="answerInput" placeholder="Type past participle…" autocomplete="off" autocorrect="off" spellcheck="false" />
      <button class="btn-check" onclick="checkAnswer()">Check</button>
    </div>

    <div class="hint-row" id="hintRow"></div>

    <div class="feedback" id="feedback">
      <div class="fb-icon" id="fbIcon"></div>
      <div class="fb-text" id="fbText"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" onclick="showHint()">💡 Hint</button>
    <button class="btn" onclick="nextVerb()">Next →</button>
    <button class="btn primary" onclick="resetSession()">↺ Reset</button>
  </div>
</div>

<script>
const VERBS = [
  ["Arise","Arisen"],["Awake","Awoken"],["Be","Been"],["Bear","Borne"],
  ["Beat","Beaten"],["Become","Become"],["Begin","Begun"],["Bend","Bent"],
  ["Bet","Bet"],["Bind","Bound"],["Bid","Bid"],["Bite","Bitten"],
  ["Bleed","Bled"],["Blow","Blown"],["Break","Broken"],["Breed","Bred"],
  ["Bring","Brought"],["Broadcast","Broadcast"],["Build","Built"],["Burn","Burnt/Burned"],
  ["Burst","Burst"],["Buy","Bought"],["Cast","Cast"],["Catch","Caught"],
  ["Come","Come"],["Cost","Cost"],["Cut","Cut"],["Choose","Chosen"],
  ["Cling","Clung"],["Creep","Crept"],["Deal","Dealt"],["Dig","Dug"],
  ["Do","Done"],["Draw","Drawn"],["Dream","Dreamt/Dreamed"],["Drink","Drunk"],
  ["Drive","Driven"],["Eat","Eaten"],["Fall","Fallen"],["Feed","Fed"],
  ["Feel","Felt"],["Fight","Fought"],["Find","Found"],["Flee","Fled"],
  ["Fly","Flown"],["Forbid","Forbidden"],["Forget","Forgotten"],["Forgive","Forgiven"],
  ["Freeze","Frozen"],["Get","Got/Gotten"],["Give","Given"],["Go","Gone"],
  ["Grow","Grown"],["Grind","Ground"],["Hang","Hung"],["Have","Had"],
  ["Hear","Heard"],["Hide","Hidden"],["Hit","Hit"],["Hold","Held"],
  ["Hurt","Hurt"],["Keep","Kept"],["Know","Known"],["Kneel","Knelt"],
  ["Knit","Knit"],["Lay","Laid"],["Lead","Led"],["Lean","Leant"],
  ["Leap","Leapt"],["Learn","Learnt/Learned"],["Leave","Left"],["Lend","Lent"],
  ["Let","Let"],["Lie","Lain"],["Light","Lit"],["Lose","Lost"],
  ["Make","Made"],["Mean","Meant"],["Meet","Met"],["Mistake","Mistaken"],
  ["Overcome","Overcome"],["Pay","Paid"],["Put","Put"],["Read","Read"],
  ["Ride","Ridden"],["Ring","Rung"],["Rise","Risen"],["Run","Run"],
  ["Say","Said"],["See","Seen"],["Seek","Sought"],["Sell","Sold"],
  ["Send","Sent"],["Set","Set"],["Sew","Sewn/Sewed"],["Shake","Shaken"],
  ["Shear","Shorn"],["Shine","Shone"],["Shoot","Shot"],["Show","Shown"],
  ["Shrink","Shrunk"],["Shut","Shut"],["Sing","Sung"],["Sink","Sunk"],
  ["Sit","Sat"],["Sleep","Slept"],["Slide","Slid"],["Smell","Smelt"],
  ["Sow","Sown/Sowed"],["Speak","Spoken"],["Speed","Sped"],["Spell","Spelt"],
  ["Spend","Spent"],["Spill","Spilt/Spilled"],["Spin","Spun"],["Spit","Spat"],
  ["Split","Split"],["Spoil","Spoilt/Spoiled"],["Spread","Spread"],["Spring","Sprung"],
  ["Stand","Stood"],["Steal","Stolen"],["Stick","Stuck"],["Sting","Stung"],
  ["Stink","Stunk"],["Stride","Stridden"],["Strike","Struck"],["Swear","Sworn"],
  ["Sweat","Sweat"],["Sweep","Swept"],["Swell","Swollen"],["Swim","Swum"],
  ["Swing","Swung"],["Take","Taken"],["Teach","Taught"],["Tear","Torn"],
  ["Tell","Told"],["Think","Thought"],["Throw","Thrown"],["Thrust","Thrust"],
  ["Tread","Trodden"],["Understand","Understood"],["Undergo","Undergone"],["Undertake","Undertaken"],
  ["Wake","Woken"],["Wear","Worn"],["Weave","Woven"],["Weep","Wept"],
  ["Wet","Wet"],["Win","Won"],["Wind","Wound"],["Withdraw","Withdrawn"],
  ["Wring","Wrung"],["Write","Written"]
];

const TOTAL = VERBS.length;

// State
let pool = [];
let current = null;
let correct = 0, wrong = 0, streak = 0, bestStreak = 0;
let answered = false;
let timerActive = false, timerInterval = null, timerSeconds = 12;
let seen = new Set();

// Load persisted best
let bestScore = parseInt(localStorage.getItem('verbforge_best') || '0');
document.getElementById('bestScore').textContent = bestScore;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function refillPool() {
  pool = shuffle([...VERBS]);
}

function nextVerb() {
  clearTimerInterval();
  if (pool.length === 0) refillPool();
  current = pool.pop();
  seen.add(current[0]);

  // Animate verb
  const display = document.getElementById('verbDisplay');
  display.style.animation = 'none';
  display.offsetHeight; // reflow
  display.style.animation = '';
  display.textContent = current[0];

  // Reset UI
  const input = document.getElementById('answerInput');
  input.value = '';
  input.className = '';
  input.disabled = false;
  input.focus();

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('hintRow').innerHTML = '';
  document.getElementById('mainCard').className = 'card';
  answered = false;

  updateProgress();
  if (timerActive) startTimer();
}

function getAccepted(answer) {
  // Parse multiple accepted answers like "Burnt/Burned"
  return answer.split('/').map(a => a.trim().toLowerCase());
}

function checkAnswer() {
  if (answered || !current) return;
  const input = document.getElementById('answerInput');
  const userVal = input.value.trim();
  if (!userVal) { input.focus(); return; }

  answered = true;
  clearTimerInterval();

  const accepted = getAccepted(current[1]);
  const isCorrect = accepted.includes(userVal.toLowerCase());

  const card = document.getElementById('mainCard');
  const fb = document.getElementById('feedback');
  const fbIcon = document.getElementById('fbIcon');
  const fbText = document.getElementById('fbText');

  if (isCorrect) {
    correct++;
    streak++;
    if (streak > bestStreak) {
      bestStreak = streak;
      if (streak > bestScore) {
        bestScore = streak;
        localStorage.setItem('verbforge_best', bestScore);
        document.getElementById('bestScore').textContent = bestScore;
      }
    }
    input.className = 'correct-input';
    card.className = 'card correct-flash';
    fb.className = 'feedback correct-fb visible';
    fbIcon.textContent = '✓';
    fbText.innerHTML = `Correct! <strong>${current[1]}</strong> — well done.`;
    playTone(true);
  } else {
    wrong++;
    streak = 0;
    input.className = 'wrong-input';
    card.className = 'card wrong-flash shake';
    fb.className = 'feedback wrong-fb visible';
    fbIcon.textContent = '✗';
    fbText.innerHTML = `Not quite. The answer is <strong>${current[1]}</strong>.`;
    playTone(false);
  }

  updateScore();
  updateStreak();
}

function showHint() {
  if (!current || answered) return;
  const answer = current[1].split('/')[0]; // first accepted
  let hint = answer[0].toUpperCase();
  for (let i = 1; i < answer.length; i++) hint += ' _';
  document.getElementById('hintRow').innerHTML = `Hint: <span>${hint}</span>`;
}

function updateScore() {
  document.getElementById('scoreCorrect').textContent = correct;
  document.getElementById('scoreWrong').textContent = wrong;
}

function updateStreak() {
  const badge = document.getElementById('streakBadge');
  document.getElementById('streakCount').textContent = streak;
  badge.className = streak >= 3 ? 'streak hot' : 'streak';
}

function updateProgress() {
  const pct = Math.round((seen.size / TOTAL) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = seen.size + ' / ' + TOTAL;
}

function resetSession() {
  correct = 0; wrong = 0; streak = 0; bestStreak = 0;
  seen = new Set();
  refillPool();
  updateScore();
  updateStreak();
  nextVerb();
}

// Timer
function toggleTimer() {
  timerActive = !timerActive;
  const btn = document.getElementById('timerToggle');
  const wrap = document.getElementById('timerBarWrap');
  btn.className = timerActive ? 'timer-toggle active' : 'timer-toggle';
  wrap.className = timerActive ? 'timer-bar-wrap visible' : 'timer-bar-wrap';
  if (timerActive) startTimer();
  else clearTimerInterval();
}

function startTimer() {
  clearTimerInterval();
  let remaining = timerSeconds;
  const bar = document.getElementById('timerBar');
  bar.style.width = '100%';
  bar.className = 'timer-bar';
  timerInterval = setInterval(() => {
    remaining -= 0.1;
    const pct = (remaining / timerSeconds) * 100;
    bar.style.width = Math.max(0, pct) + '%';
    if (pct < 30) bar.className = 'timer-bar warning';
    if (remaining <= 0) {
      clearTimerInterval();
      if (!answered) {
        // Time up — auto fail
        answered = true;
        wrong++;
        streak = 0;
        const card = document.getElementById('mainCard');
        const fb = document.getElementById('feedback');
        card.className = 'card wrong-flash shake';
        fb.className = 'feedback wrong-fb visible';
        document.getElementById('fbIcon').textContent = '⏰';
        document.getElementById('fbText').innerHTML = `Time's up! Answer: <strong>${current[1]}</strong>`;
        document.getElementById('answerInput').disabled = true;
        updateScore();
        updateStreak();
        playTone(false);
      }
    }
  }, 100);
}

function clearTimerInterval() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

// Sound
function playTone(success) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (success) {
      [523, 659, 784].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.25);
        osc.start(ctx.currentTime + i * 0.1);
        osc.stop(ctx.currentTime + i * 0.1 + 0.25);
      });
    } else {
      [220, 196].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sawtooth';
        gain.gain.setValueAtTime(0.1, ctx.currentTime + i * 0.12);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.3);
        osc.start(ctx.currentTime + i * 0.12);
        osc.stop(ctx.currentTime + i * 0.12 + 0.3);
      });
    }
  } catch(e) {}
}

// Enter key
document.getElementById('answerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (answered) nextVerb();
    else checkAnswer();
  }
});

// Init
refillPool();
nextVerb();
</script>
