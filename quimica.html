<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chem Forge — Elementos Químicos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --surface: #12161e;
    --card: #181e28;
    --border: #262e3e;
    --accent: #5bc8f5;
    --accent2: #e05c5c;
    --accent3: #5ce07a;
    --accent4: #a78bfa;
    --text: #f0f0f5;
    --muted: #6a7a99;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* Back button */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 7px 16px;
    color: var(--muted);
    font-size: 0.83rem;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    align-self: flex-start;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  header { text-align: center; padding-top: 4px; }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--accent) 30%, var(--accent4) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 6px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }

  /* Mode toggle */
  .mode-toggle {
    display: flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 4px;
    gap: 4px;
  }
  .mode-btn {
    flex: 1;
    padding: 8px 10px;
    border: none;
    border-radius: 50px;
    background: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    line-height: 1.3;
  }
  .mode-btn.active {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .mode-btn small { display: block; font-size: 0.68rem; color: var(--muted); font-weight: 400; }
  .mode-btn.active small { color: var(--accent); }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 4px;
    gap: 4px;
  }
  .tab-btn {
    flex: 1;
    padding: 8px 14px;
    border: none;
    border-radius: 50px;
    background: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .tab-btn.active {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .tab-badge {
    background: var(--accent2);
    color: #fff;
    font-size: 0.7rem;
    border-radius: 50px;
    padding: 1px 7px;
    font-family: 'DM Mono', monospace;
    display: none;
  }
  .tab-badge.visible { display: inline-block; }

  .page { display: none; flex-direction: column; gap: 18px; }
  .page.active { display: flex; }

  /* Score row */
  .score-row {
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
  }
  .score-chips { display: flex; gap: 8px; }
  .chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 6px 14px;
    font-size: 0.82rem;
    font-family: 'DM Mono', monospace;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .chip .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .chip.correct .dot { background: var(--accent3); }
  .chip.wrong   .dot { background: var(--accent2); }
  .chip.best { color: var(--accent); border-color: #102030; background: #081420; }

  /* Timer */
  .timer-section { display: flex; align-items: center; gap: 8px; }
  .timer-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 50px;
    padding: 5px 12px;
    font-size: 0.78rem;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: all 0.2s;
  }
  .timer-toggle:hover, .timer-toggle.active { border-color: var(--accent); color: var(--accent); }
  .timer-bar-wrap { flex: 1; height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; display: none; }
  .timer-bar-wrap.visible { display: block; }
  .timer-bar { height: 100%; background: var(--accent); border-radius: 4px; width: 100%; transition: width 0.1s linear, background 0.5s; }
  .timer-bar.warning { background: var(--accent2); }

  /* Progress */
  .progress-section { display: flex; align-items: center; gap: 12px; }
  .progress-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 6px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent4)); border-radius: 6px; transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .progress-label { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); white-space: nowrap; }

  /* Streak */
  .streak {
    display: inline-flex; align-items: center; gap: 5px;
    background: linear-gradient(135deg, #001a2a, #001020);
    border: 1px solid #003050; border-radius: 50px;
    padding: 5px 12px; font-size: 0.82rem;
    font-family: 'DM Mono', monospace; color: var(--accent); transition: all 0.3s;
  }
  .streak.hot { animation: pulse 1s infinite; border-color: var(--accent); box-shadow: 0 0 12px rgba(91,200,245,0.3); }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 12px rgba(91,200,245,0.3); }
    50%      { box-shadow: 0 0 24px rgba(91,200,245,0.5); }
  }

  /* Main card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 28px;
    position: relative;
    overflow: hidden;
    transition: box-shadow 0.3s;
  }
  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }
  .card.shake { animation: shake 0.4s ease; }
  .card.correct-flash { box-shadow: 0 0 0 2px var(--accent3), 0 0 40px rgba(92,224,122,0.15); }
  .card.wrong-flash   { box-shadow: 0 0 0 2px var(--accent2), 0 0 40px rgba(224,92,92,0.15); }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .question-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* Element card display */
  .element-box {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(91,200,245,0.06);
    border: 2px solid rgba(91,200,245,0.2);
    border-radius: 12px;
    padding: 14px 22px;
    margin-bottom: 24px;
    min-width: 100px;
    position: relative;
  }
  .element-box .el-number {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    align-self: flex-start;
  }
  .element-box .el-symbol {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.6rem, 8vw, 4rem);
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  .element-box .el-name-display {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 6vw, 2.6rem);
    font-weight: 700;
    color: var(--accent);
    line-height: 1.1;
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes popIn {
    from { opacity: 0; transform: translateY(10px) scale(0.9); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .input-row { display: flex; gap: 10px; align-items: stretch; }

  input[type="text"] {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1.05rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,200,245,0.12); }
  input[type="text"].correct-input { border-color: var(--accent3); }
  input[type="text"].wrong-input   { border-color: var(--accent2); }

  .btn-main {
    border: none;
    border-radius: 10px;
    padding: 14px 20px;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: transform 0.15s, background 0.15s, box-shadow 0.15s;
    white-space: nowrap;
    min-width: 110px;
    text-align: center;
  }
  .btn-main.check-mode { background: var(--accent); color: #041420; }
  .btn-main.check-mode:hover { background: #80d9f8; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(91,200,245,0.3); }
  .btn-main.next-ok  { background: var(--accent3); color: #0a1f10; }
  .btn-main.next-ok:hover  { background: #7aeca0; transform: translateY(-1px); }
  .btn-main.next-err { background: var(--accent2); color: #fff; }
  .btn-main.next-err:hover { background: #e87a7a; transform: translateY(-1px); }
  .btn-main:active { transform: translateY(0) !important; }

  /* Feedback */
  .feedback {
    margin-top: 18px; border-radius: 10px; padding: 14px 16px;
    font-size: 0.92rem; display: none;
    animation: fadeUp 0.25s ease; align-items: center; gap: 10px;
  }
  .feedback.visible { display: flex; }
  .feedback.correct-fb { background: rgba(92,224,122,0.08); border: 1px solid rgba(92,224,122,0.25); color: var(--accent3); }
  .feedback.wrong-fb   { background: rgba(224,92,92,0.08);  border: 1px solid rgba(224,92,92,0.25);  color: var(--accent2); }
  .feedback .fb-icon { font-size: 1.3rem; flex-shrink: 0; }
  .feedback .fb-text strong { font-family: 'DM Mono', monospace; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hint-row { margin-top: 12px; font-size: 0.8rem; color: var(--muted); font-family: 'DM Mono', monospace; min-height: 1.2em; }
  .hint-row span { color: var(--accent); letter-spacing: 0.1em; }

  /* Controls */
  .controls { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    flex: 1; min-width: 100px; padding: 13px 16px; border-radius: 10px;
    font-size: 0.9rem; font-family: 'DM Sans', sans-serif; font-weight: 600;
    cursor: pointer; transition: all 0.2s; border: 1.5px solid var(--border);
    background: var(--card); color: var(--text);
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
  .btn.danger { border-color: #3a1010; color: var(--muted); }
  .btn.danger:hover { border-color: var(--accent2); color: var(--accent2); }

  /* Practice banner */
  .practice-banner {
    background: rgba(224,92,92,0.1); border: 1px solid rgba(224,92,92,0.3);
    border-radius: 10px; padding: 10px 16px; font-size: 0.85rem;
    color: var(--accent2); font-family: 'DM Mono', monospace;
    display: none; align-items: center; justify-content: space-between; gap: 10px;
  }
  .practice-banner.visible { display: flex; }
  .practice-banner button {
    background: none; border: 1px solid rgba(224,92,92,0.4); border-radius: 6px;
    color: var(--accent2); font-size: 0.75rem; padding: 3px 10px;
    cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.2s; white-space: nowrap;
  }
  .practice-banner button:hover { background: rgba(224,92,92,0.15); }

  /* ── MISTAKES PAGE ── */
  .mistakes-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .mistakes-header h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; }
  .btn-sm {
    padding: 7px 14px; border-radius: 8px; border: 1.5px solid var(--border);
    background: var(--card); color: var(--muted); font-size: 0.8rem;
    font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-sm:hover { border-color: var(--accent2); color: var(--accent2); }

  .mistakes-empty {
    text-align: center; padding: 48px 24px; color: var(--muted);
    font-size: 0.95rem; background: var(--card);
    border: 1px solid var(--border); border-radius: var(--radius);
  }
  .mistakes-empty .em-icon { font-size: 2.5rem; display: block; margin-bottom: 12px; }

  .mistakes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .mistake-card {
    background: var(--card); border: 1px solid rgba(224,92,92,0.25);
    border-radius: 12px; padding: 16px;
    display: flex; flex-direction: column; gap: 5px;
    position: relative; animation: fadeUp 0.3s ease;
  }
  .mistake-card .mc-top { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .mistake-card .mc-symbol { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 900; color: var(--accent); line-height: 1; }
  .mistake-card .mc-arrow { font-size: 0.78rem; color: var(--muted); }
  .mistake-card .mc-name { font-family: 'DM Mono', monospace; font-size: 0.9rem; color: var(--accent2); font-weight: 500; padding-bottom: 14px; }
  .mistake-card .mc-count {
    position: absolute; top: 10px; right: 10px;
    background: rgba(224,92,92,0.15); border: 1px solid rgba(224,92,92,0.3);
    border-radius: 50px; padding: 2px 8px;
    font-size: 0.68rem; font-family: 'DM Mono', monospace; color: var(--accent2);
  }
  .mistake-card .mc-del {
    position: absolute; bottom: 8px; right: 10px;
    background: none; border: none; color: var(--border);
    font-size: 1rem; cursor: pointer; transition: color 0.2s; padding: 2px;
  }
  .mistake-card .mc-del:hover { color: var(--accent2); }

  .practice-mistakes-btn {
    width: 100%; padding: 14px; border-radius: 10px;
    background: rgba(224,92,92,0.1); border: 1.5px solid rgba(224,92,92,0.35);
    color: var(--accent2); font-family: 'DM Sans', sans-serif;
    font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.2s;
  }
  .practice-mistakes-btn:hover:not(:disabled) { background: rgba(224,92,92,0.2); transform: translateY(-1px); }
  .practice-mistakes-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  @media (max-width: 420px) {
    .card { padding: 24px 18px; }
    .mistakes-grid { grid-template-columns: 1fr; }
    .mode-btn { font-size: 0.76rem; }
  }
</style>
</head>
<body>
<div class="container">

  <a class="back-btn" href="index.html">← Verbos Irregulares</a>

  <header>
    <h1>⚗ Chem Forge</h1>
    <p>// entrenador de elementos químicos</p>
  </header>

  <!-- Mode selector -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeSymbol" onclick="setMode('symbol', this)">
      🔤 Símbolo → Nombre
      <small>Te doy el símbolo, dices el nombre</small>
    </button>
    <button class="mode-btn" id="modeName" onclick="setMode('name', this)">
      📝 Nombre → Símbolo
      <small>Te doy el nombre, dices el símbolo</small>
    </button>
    <button class="mode-btn" id="modeMix" onclick="setMode('mix', this)">
      🔀 Mixto
      <small>Aleatorio</small>
    </button>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" id="tabPractice" onclick="switchTab('practice', this)">⚡ Práctica</button>
    <button class="tab-btn" id="tabMistakes" onclick="switchTab('mistakes', this)">
      ✗ Errores <span class="tab-badge" id="mistakesBadge">0</span>
    </button>
  </div>

  <!-- ══ PRACTICE PAGE ══ -->
  <div class="page active" id="page-practice">

    <div class="score-row">
      <div class="score-chips">
        <div class="chip correct"><div class="dot"></div><span id="scoreCorrect">0</span> correctas</div>
        <div class="chip wrong"><div class="dot"></div><span id="scoreWrong">0</span> errores</div>
      </div>
      <div class="streak" id="streakBadge">⚗ <span id="streakCount">0</span></div>
      <div class="chip best">⭐ Mejor: <span id="bestScore">0</span></div>
    </div>

    <div class="timer-section">
      <button class="timer-toggle" id="timerToggle" onclick="toggleTimer()">⏱ Temporizador</button>
      <div class="timer-bar-wrap" id="timerBarWrap">
        <div class="timer-bar" id="timerBar"></div>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progressLabel">0 / 50</div>
    </div>

    <div class="practice-banner" id="practiceBanner">
      ⚠ Practicando errores — <span id="practiceCount">0</span> elementos
      <button onclick="exitPracticeMode()">✕ Salir</button>
    </div>

    <div class="card" id="mainCard">
      <div class="question-label" id="questionLabel">Símbolo del elemento</div>
      <div class="element-box">
        <span class="el-number" id="elNumber"></span>
        <span id="elDisplay" class="el-symbol">—</span>
      </div>

      <div class="input-row">
        <input type="text" id="answerInput"
          placeholder="Escribe tu respuesta…"
          autocomplete="off" autocorrect="off" spellcheck="false" />
        <button class="btn-main check-mode" id="mainBtn" onclick="handleMainBtn()">Verificar</button>
      </div>

      <div class="hint-row" id="hintRow"></div>

      <div class="feedback" id="feedback">
        <div class="fb-icon" id="fbIcon"></div>
        <div class="fb-text" id="fbText"></div>
      </div>
    </div>

    <div class="controls">
      <button class="btn" onclick="showHint()">💡 Pista</button>
      <button class="btn danger" onclick="resetSession()">↺ Reiniciar</button>
    </div>

  </div>

  <!-- ══ MISTAKES PAGE ══ -->
  <div class="page" id="page-mistakes">

    <div class="mistakes-header">
      <h2>Errores &nbsp;<span id="mistakesCount" style="color:var(--accent2)">0</span></h2>
      <button class="btn-sm" onclick="clearAllMistakes()">Borrar todo</button>
    </div>

    <button class="practice-mistakes-btn" id="practiceMistakesBtn"
            onclick="startPracticeMode()" disabled>
      🔁 Practicar solo mis errores
    </button>

    <div id="mistakesEmpty" class="mistakes-empty">
      <span class="em-icon">⚗</span>
      ¡Sin errores todavía! Sigue practicando.
    </div>

    <div class="mistakes-grid" id="mistakesGrid"></div>

  </div>

</div>

<script>
// [number, symbol, name]
const ELEMENTS = [
  [1,"H","Hidrógeno"],[2,"He","Helio"],[3,"Li","Litio"],[4,"Be","Berilio"],
  [5,"B","Boro"],[6,"C","Carbono"],[7,"N","Nitrógeno"],[8,"O","Oxígeno"],
  [9,"F","Flúor"],[10,"Ne","Neón"],[11,"Na","Sodio"],[12,"Mg","Magnesio"],
  [13,"Al","Aluminio"],[14,"Si","Silicio"],[15,"P","Fósforo"],[16,"S","Azufre"],
  [17,"Cl","Cloro"],[18,"Ar","Argón"],[19,"K","Potasio"],[20,"Ca","Calcio"],
  [21,"Sc","Escandio"],[22,"Ti","Titanio"],[23,"V","Vanadio"],[24,"Cr","Cromo"],
  [25,"Mn","Manganeso"],[26,"Fe","Hierro"],[27,"Co","Cobalto"],[28,"Ni","Níquel"],
  [29,"Cu","Cobre"],[30,"Zn","Zinc"],[31,"Ga","Galio"],[32,"Ge","Germanio"],
  [33,"As","Arsénico"],[34,"Se","Selenio"],[35,"Br","Bromo"],[36,"Kr","Kriptón"],
  [37,"Rb","Rubidio"],[38,"Sr","Estroncio"],[39,"Y","Itrio"],[40,"Zr","Circonio"],
  [41,"Nb","Niobio"],[42,"Mo","Molibdeno"],[43,"Tc","Tecnecio"],[44,"Ru","Rutenio"],
  [45,"Rh","Rodio"],[46,"Pd","Paladio"],[47,"Ag","Plata"],[48,"Cd","Cadmio"],
  [49,"In","Indio"],[50,"Sn","Estaño"]
];

const TOTAL = ELEMENTS.length;

let pool = [];
let current = null;
let currentMode = 'symbol'; // which direction for this question
let globalMode = 'symbol';  // user's selected mode
let correct = 0, wrong = 0, streak = 0, bestStreak = 0;
let answered = false;
let timerActive = false, timerInterval = null, timerSeconds = 12;
let seen = new Set();
let mistakesMap = {};
let practiceMode = false;
let practicePool = [];

let bestScore = parseInt(localStorage.getItem('chemforge_best') || '0');
document.getElementById('bestScore').textContent = bestScore;

// ── MODE ──
function setMode(m, el) {
  globalMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  seen = new Set();
  refillPool();
  nextElement();
}

// ── TABS ──
function switchTab(name, el) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('page-' + name).classList.add('active');
  if (name === 'mistakes') renderMistakes();
}

// ── SHUFFLE ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function refillPool() { pool = shuffle(ELEMENTS); }

// ── NEXT ELEMENT ──
function nextElement() {
  clearTimerInterval();

  if (practiceMode) {
    if (practicePool.length === 0)
      practicePool = shuffle(Object.values(mistakesMap).map(m => m.el));
    if (practicePool.length === 0) { exitPracticeMode(); return; }
    current = practicePool.pop();
  } else {
    if (pool.length === 0) refillPool();
    current = pool.pop();
    seen.add(current[1]);
    updateProgress();
  }

  // Pick direction
  if (globalMode === 'symbol') currentMode = 'symbol';
  else if (globalMode === 'name') currentMode = 'name';
  else currentMode = Math.random() < 0.5 ? 'symbol' : 'name';

  // Display
  const display = document.getElementById('elDisplay');
  display.style.animation = 'none';
  display.offsetHeight;
  display.style.animation = '';

  document.getElementById('elNumber').textContent = '#' + current[0];

  if (currentMode === 'symbol') {
    // Show symbol → ask name
    display.className = 'el-symbol';
    display.textContent = current[1];
    document.getElementById('questionLabel').textContent = 'Símbolo → ¿Cuál es el nombre?';
    document.getElementById('answerInput').placeholder = 'Escribe el nombre del elemento…';
  } else {
    // Show name → ask symbol
    display.className = 'el-name-display';
    display.textContent = current[2];
    document.getElementById('questionLabel').textContent = 'Nombre → ¿Cuál es el símbolo?';
    document.getElementById('answerInput').placeholder = 'Escribe el símbolo (ej: Fe)…';
  }

  const input = document.getElementById('answerInput');
  input.value = '';
  input.className = '';
  input.disabled = false;

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('hintRow').innerHTML = '';
  document.getElementById('mainCard').className = 'card';

  const btn = document.getElementById('mainBtn');
  btn.textContent = 'Verificar';
  btn.className = 'btn-main check-mode';

  answered = false;
  input.focus();
  if (timerActive) startTimer();
}

// ── UNIFIED BUTTON ──
function handleMainBtn() {
  if (!answered) checkAnswer();
  else nextElement();
}

function normalize(s) { return s.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }

function checkAnswer() {
  if (answered || !current) return;
  const input = document.getElementById('answerInput');
  const val = input.value.trim();
  if (!val) { input.focus(); return; }

  answered = true;
  clearTimerInterval();

  let correct_answer, user_ans;
  if (currentMode === 'symbol') {
    correct_answer = current[2]; // name
    user_ans = normalize(val) === normalize(current[2]);
  } else {
    correct_answer = current[1]; // symbol
    user_ans = val.toLowerCase() === current[1].toLowerCase();
  }

  const card = document.getElementById('mainCard');
  const fb   = document.getElementById('feedback');
  const btn  = document.getElementById('mainBtn');

  if (user_ans) {
    correct++; streak++;
    if (streak > bestStreak) bestStreak = streak;
    if (streak > bestScore) {
      bestScore = streak;
      localStorage.setItem('chemforge_best', bestScore);
      document.getElementById('bestScore').textContent = bestScore;
    }
    input.className = 'correct-input';
    card.className = 'card correct-flash';
    fb.className = 'feedback correct-fb visible';
    document.getElementById('fbIcon').textContent = '✓';
    document.getElementById('fbText').innerHTML = `¡Correcto! <strong>${correct_answer}</strong>`;
    btn.textContent = 'Siguiente →';
    btn.className = 'btn-main next-ok';
    playTone(true);
  } else {
    wrong++; streak = 0;
    addMistake(current);
    input.className = 'wrong-input';
    card.className = 'card wrong-flash shake';
    fb.className = 'feedback wrong-fb visible';
    document.getElementById('fbIcon').textContent = '✗';
    document.getElementById('fbText').innerHTML = `La respuesta correcta es <strong>${correct_answer}</strong>.`;
    btn.textContent = 'Siguiente →';
    btn.className = 'btn-main next-err';
    playTone(false);
  }

  updateScore();
  updateStreak();
}

// ── MISTAKES ──
function addMistake(el) {
  const k = el[1];
  if (!mistakesMap[k]) mistakesMap[k] = { el, count: 1 };
  else mistakesMap[k].count++;
  updateMistakesBadge();
}

function removeMistake(k) {
  delete mistakesMap[k];
  updateMistakesBadge();
  renderMistakes();
}

function clearAllMistakes() {
  mistakesMap = {};
  updateMistakesBadge();
  renderMistakes();
}

function updateMistakesBadge() {
  const n = Object.keys(mistakesMap).length;
  const badge = document.getElementById('mistakesBadge');
  badge.textContent = n;
  badge.className = n > 0 ? 'tab-badge visible' : 'tab-badge';
  document.getElementById('mistakesCount').textContent = n;
  document.getElementById('practiceMistakesBtn').disabled = n === 0;
}

function renderMistakes() {
  const grid  = document.getElementById('mistakesGrid');
  const empty = document.getElementById('mistakesEmpty');
  const keys  = Object.keys(mistakesMap);

  if (keys.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  const sorted = keys.sort((a, b) => mistakesMap[b].count - mistakesMap[a].count);
  grid.innerHTML = sorted.map(k => {
    const m = mistakesMap[k];
    const el = m.el;
    return `
    <div class="mistake-card">
      <span class="mc-count">×${m.count}</span>
      <div class="mc-top">#${el[0]}</div>
      <div class="mc-symbol">${el[1]}</div>
      <div class="mc-arrow">↓ nombre</div>
      <div class="mc-name">${el[2]}</div>
      <button class="mc-del" onclick="removeMistake('${k}')" title="Borrar">✕</button>
    </div>`;
  }).join('');
}

// ── PRACTICE MODE ──
function startPracticeMode() {
  if (Object.keys(mistakesMap).length === 0) return;
  practiceMode = true;
  practicePool = shuffle(Object.values(mistakesMap).map(m => m.el));
  document.getElementById('practiceBanner').className = 'practice-banner visible';
  document.getElementById('practiceCount').textContent = Object.keys(mistakesMap).length;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('tabPractice').classList.add('active');
  document.getElementById('page-practice').classList.add('active');
  nextElement();
}

function exitPracticeMode() {
  practiceMode = false;
  practicePool = [];
  document.getElementById('practiceBanner').className = 'practice-banner';
  nextElement();
}

// ── HINT ──
function showHint() {
  if (!current || answered) return;
  const answer = currentMode === 'symbol' ? current[2] : current[1];
  let h = answer[0].toUpperCase();
  for (let i = 1; i < answer.length; i++) h += ' _';
  document.getElementById('hintRow').innerHTML = `Pista: <span>${h}</span>`;
}

// ── SCORE / STREAK / PROGRESS ──
function updateScore() {
  document.getElementById('scoreCorrect').textContent = correct;
  document.getElementById('scoreWrong').textContent = wrong;
}
function updateStreak() {
  document.getElementById('streakCount').textContent = streak;
  document.getElementById('streakBadge').className = streak >= 3 ? 'streak hot' : 'streak';
}
function updateProgress() {
  const pct = Math.round((seen.size / TOTAL) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = seen.size + ' / ' + TOTAL;
}

// ── RESET ──
function resetSession() {
  correct = 0; wrong = 0; streak = 0; bestStreak = 0;
  seen = new Set(); mistakesMap = {};
  practiceMode = false; practicePool = [];
  document.getElementById('practiceBanner').className = 'practice-banner';
  updateMistakesBadge();
  refillPool();
  updateScore();
  updateStreak();
  nextElement();
}

// ── TIMER ──
function toggleTimer() {
  timerActive = !timerActive;
  document.getElementById('timerToggle').className = timerActive ? 'timer-toggle active' : 'timer-toggle';
  document.getElementById('timerBarWrap').className = timerActive ? 'timer-bar-wrap visible' : 'timer-bar-wrap';
  if (timerActive) startTimer(); else clearTimerInterval();
}

function startTimer() {
  clearTimerInterval();
  let rem = timerSeconds;
  const bar = document.getElementById('timerBar');
  bar.style.width = '100%';
  bar.className = 'timer-bar';
  timerInterval = setInterval(() => {
    rem -= 0.1;
    const pct = (rem / timerSeconds) * 100;
    bar.style.width = Math.max(0, pct) + '%';
    if (pct < 30) bar.className = 'timer-bar warning';
    if (rem <= 0) {
      clearTimerInterval();
      if (!answered) {
        answered = true; wrong++; streak = 0;
        addMistake(current);
        const btn = document.getElementById('mainBtn');
        const answer = currentMode === 'symbol' ? current[2] : current[1];
        document.getElementById('mainCard').className = 'card wrong-flash shake';
        document.getElementById('feedback').className = 'feedback wrong-fb visible';
        document.getElementById('fbIcon').textContent = '⏰';
        document.getElementById('fbText').innerHTML = `¡Tiempo! Respuesta: <strong>${answer}</strong>`;
        document.getElementById('answerInput').disabled = true;
        btn.textContent = 'Siguiente →';
        btn.className = 'btn-main next-err';
        updateScore(); updateStreak();
        playTone(false);
      }
    }
  }, 100);
}

function clearTimerInterval() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

// ── SOUND ──
function playTone(ok) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    (ok ? [523,659,784] : [220,196]).forEach((freq, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = freq;
      o.type = ok ? 'sine' : 'sawtooth';
      const t = ctx.currentTime + i * (ok ? 0.1 : 0.12);
      g.gain.setValueAtTime(ok ? 0.15 : 0.1, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
      o.start(t); o.stop(t + 0.28);
    });
  } catch(e) {}
}

document.getElementById('answerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleMainBtn();
});

refillPool();
nextElement();
</script>
</body>
